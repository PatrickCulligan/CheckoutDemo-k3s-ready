services:
  postgres:
    image: postgres:16
    container_name: checkoutdemo-postgres
    environment:
      POSTGRES_DB: checkoutdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pricing:
    build:
      context: .
      dockerfile: src/Pricing/Dockerfile
    container_name: checkoutdemo-pricing
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
    ports:
      - "5003:8080"
    depends_on:
      - postgres

  inventory:
    build:
      context: .
      dockerfile: src/Inventory/Dockerfile
    container_name: checkoutdemo-inventory
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
    ports:
      - "5004:8080"
    depends_on:
      - postgres

  checkout:
    build:
      context: .
      dockerfile: src/Checkout/Dockerfile
    container_name: checkoutdemo-checkout
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Services__PricingBaseUrl: http://pricing:8080
      Services__InventoryBaseUrl: http://inventory:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=checkoutdb;Username=postgres;Password=postgres
    ports:
      - "5002:8080"
    depends_on:
      - postgres
      - pricing
      - inventory

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/Dockerfile
    container_name: checkoutdemo-gateway
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Services__CheckoutBaseUrl: http://checkout:8080
    ports:
      - "5001:8080"
    depends_on:
      - checkout

volumes:
  postgres-data:
